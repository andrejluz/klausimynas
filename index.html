<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Iššūkis</title>
    <style>
        :root { --p: #6c5ce7; --bg: #f9f9fb; --txt: #2d3436; }
        body { font-family: sans-serif; background: var(--bg); color: var(--txt); display: flex; justify-content: center; padding: 20px; }
        #card { background: white; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none; }
        .btn { background: var(--p); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; margin: 8px 0; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .opt { background: white; border: 2px solid var(--p); color: var(--txt); }
        #qr-box img { width: 180px; margin: 20px 0; border: 5px solid #eee; border-radius: 10px; }
        .score-board { margin-top: 20px; padding: 10px; background: #eee; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="card">
    <div id="s-start">
        <h1>🚀 Quiz Iššūkis</h1>
        <div id="qr-box"></div>
        <p>Skenuok kodą draugo telefone arba spausk pradėti!</p>
        <button class="btn" onclick="start()">PRADĖTI ŽAIDIMĄ</button>
        <div id="high-score" class="score-board">Geriausias rezultatas: 0</div>
    </div>

    <div id="s-quiz" class="hidden">
        <div id="progress" style="color: var(--p); margin-bottom: 10px;"></div>
        <h2 id="q-text">Kraunama...</h2>
        <div id="options"></div>
    </div>

    <div id="s-result" class="hidden">
        <h1>Baigta! 🎉</h1>
        <h2 id="final-score">0/20</h2>
        <div id="rating" style="font-size: 1.5rem; margin-bottom: 20px;"></div>
        <button class="btn" onclick="location.reload()">Žaisti vėl</button>
    </div>
</div>

<script>
    let questions = [];
    let current = 0;
    let score = 0;

    // 1. Užkraunam JSON duomenis
    async function loadData() {
        try {
            const res = await fetch('questions.json');
            questions = await res.json();
            genQR();
            showHS();
        } catch (e) { console.error("Klaida užkraunant JSON"); }
    }

    // 2. Sugeneruojam QR kodą šiam puslapiui
    function genQR() {
        const url = window.location.href;
        document.getElementById('qr-box').innerHTML = 
            `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(url)}">`;
    }

    function start() {
        document.getElementById('s-start').classList.add('hidden');
        document.getElementById('s-quiz').classList.remove('hidden');
        showQ();
    }

    function showQ() {
        const q = questions[current];
        document.getElementById('progress').innerText = `Klausimas ${current + 1} iš ${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        const box = document.getElementById('options');
        box.innerHTML = '';
        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.innerText = opt;
            b.className = 'btn opt';
            b.onclick = () => check(i);
            box.appendChild(b);
        });
    }

    function check(idx) {
        if(idx === questions[current].c) score++;
        current++;
        if(current < questions.length) showQ(); else finish();
    }

    function finish() {
        document.getElementById('s-quiz').classList.add('hidden');
        document.getElementById('s-result').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        
        // Reitingas
        let r = score > 15 ? "🔥 PRO" : score > 10 ? "😎 Vidutiniokas" : "😅 Bandyk dar kartą";
        document.getElementById('rating').innerText = r;

        // Išsaugojam reitingą telefone
        const hs = localStorage.getItem('quiz_hs') || 0;
        if(score > hs) {
            localStorage.setItem('quiz_hs', score);
        }
    }

    function showHS() {
        const hs = localStorage.getItem('quiz_hs') || 0;
        document.getElementById('high-score').innerText = `Tavo rekordas: ${hs} taškų`;
    }

    loadData();
</script>

</body>
</html>
